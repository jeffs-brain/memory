# SPDX-License-Identifier: Apache-2.0
name: eval-smoke

on:
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: smoke (${{ matrix.sdk }})
    strategy:
      fail-fast: false
      matrix:
        sdk: [ts, go, py]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: astral-sh/setup-uv@v3
      - name: Install TS workspace
        run: bun install --frozen-lockfile
      - name: Sync eval deps
        run: uv sync
        working-directory: eval
      - name: Build ${{ matrix.sdk }} SDK
        run: |
          case "${{ matrix.sdk }}" in
            ts) bun run --filter @jeffs-brain/memory build ;;
            go) cd go && go build ./... ;;
            py) cd sdks/py && uv sync && uv run memory --version ;;
          esac
      - name: Run smoke eval
        run: |
          uv run python runner.py \
            --sdk ${{ matrix.sdk }} \
            --dataset datasets/smoke.jsonl \
            --scorer exact \
            --scenario search-retrieve-only \
            --mode bm25 \
            --brain eval \
            --seed-reference-brain \
            --floor 0.90 \
            --output results/
        working-directory: eval
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-${{ matrix.sdk }}
          path: eval/results/
          if-no-files-found: warn
