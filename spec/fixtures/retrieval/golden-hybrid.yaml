    any_of:
      - business/cargill.md
      - clients/cargill.md
      - business/alimentsa-sa.md
      - business/central-food-products-co-ltd.md
    notes: "Food/agri clients without the literal term 'food industry'."

  - id: invoice-automation
    q: "what do we do for invoice automation"
    any_of:
