      - workflows/invoice-processing-pipeline-pattern.md
      - workflows/fusion-colors-invoice-processing.md
      - workflows/purchase-invoice-extraction.md
    notes: "Natural-language question, many legitimate workflow answers."

  - id: data-quality-work
    q: "our data quality work"
    any_of:
      - projects/cargill-dq-poc.md
      - business/cargill-data-quality-framework.md
      - clients/cargill.md
    notes: "DQ / data quality recurs across the Cargill project family."

  # --- Relationship queries (v1 screenshot issues, must still pass) ---

  - id: lleverage-bosch
    q: "what can you tell me about the relationship between lleverage and bosch"
    any_of:
