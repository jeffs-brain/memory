queries:
  # Hybrid-specific golden set. These questions are intentionally
  # phrased in ways that lexical (BM25) retrieval struggles with
  # because the expected answer articles do not contain the query
  # terms verbatim. Semantic retrieval via bge-m3 should surface
  # the right articles. Hybrid fusion (BM25 + vector) should be
  # the best of both worlds.

  # --- Concept queries ---

  - id: machine-learning-clients
    q: "our machine learning clients"
    any_of:
      - administrative/walmart.md
      - clients/heineken.md
      - business/cargill.md
      - partners/boomerang.md
      - clients/bosch-pt.md
    notes: "Client articles that mention AI use cases but not 'machine learning' verbatim. Pure semantic target."

  - id: document-processing-pipelines
    q: "automated document processing pipelines"
    any_of:
      - workflows/invoice-processing-pipeline-pattern.md
      - technology/invoice-processing-pipeline.md
      - workflows/purchase-invoice-extraction.md
      - workflows/sales-order-processing.md
    notes: "Document processing is the conceptual query; answers are the specific pipelines."

  - id: food-industry-clients
