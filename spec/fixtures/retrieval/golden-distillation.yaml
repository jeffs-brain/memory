queries:
  # Distillation-sensitive golden set. These queries mimic patterns where
  # the raw user input would benefit from LLM rewriting before retrieval.
  # Categories: long error pastes, shallow/vague queries, anaphoric
  # references, multi-intent, negation, domain jargon, conversational,
  # and code-heavy queries.

  # ====================================================================
  # Category 1: Long error pastes (10 queries)
  # The actual question is buried inside or after a wall of error output.
  # A distiller should extract the core question and discard the noise.
  # ====================================================================

  - id: error-paste-deployment-fail
    q: |
      I ran deploy and got this:
      ERROR: gcloud run services replace service.yaml
      Deploying new revision...
      Setting IAM Policy...
      ERROR: (gcloud.run.services.replace) PERMISSION_DENIED: Permission 'run.services.update' denied on resource 'namespaces/lleverage-staging/services/gemma4-31b'
      Revision deployment failed with 1 error(s):
        * Permission denied on service account
      at Object.deployRevision (/deploy/steps.ts:142:11)
      at async /deploy/pipeline.ts:89:5
      How do we grant the service account deploy permissions in staging?
    any_of:
      - operations/cloud-run-deployment.md
      - operations/gcp-iam-permissions.md
      - operations/staging-environment.md
      - infrastructure/service-accounts.md
    notes: "Category: long-error-paste. Question is the last line. Distiller should extract: 'How to grant service account deploy permissions in staging?'"

  - id: error-paste-compile-crash
    q: |
      brain compile just died:

      2026-04-10T14:23:01Z ERR compile wave=3 file=documents/business-case-detail-wk8-15-v2-raw.md err="vLLM returned HTTP 500: {\"object\":\"error\",\"message\":\"ValueError: Input too long for max_model_len=32767\",\"type\":\"invalid_request_error\",\"code\":null}"
      2026-04-10T14:23:01Z ERR compile wave=3 file=documents/fresh-food-planner-23-03-26.md err="vLLM returned HTTP 500: {\"object\":\"error\",\"message\":\"ValueError: Input too long for max_model_len=32767\",\"type\":\"invalid_request_error\",\"code\":null}"
      2026-04-10T14:23:02Z ERR compile wave=3 total=42 compiled=38 failed=4

      Is this the same poison file issue from last time?
    any_of:
      - operations/brain-compile-troubleshooting.md
      - operations/vllm-configuration.md
      - operations/known-poison-files.md
      - technology/gemma4-deployment.md
    notes: "Category: long-error-paste. Actual question is 'Is this the poison file issue?' buried after multi-line error log."

  - id: error-paste-fts-index
    q: |
      jeff brain search "bosch contracts" --bm25

      panic: runtime error: index out of range [5] with length 5

      goroutine 1 [running]:
      github.com/jaythegeek/jeff/apps/jeff/internal/search.(*Index).Search(0xc0001a2000, {0x7ffd2a1b3e10, 0x10}, 0x5)
              /home/jaythegeek/code/jeff/apps/jeff/internal/search/index.go:247 +0x3a5
      github.com/jaythegeek/jeff/apps/jeff/internal/knowledge.(*KnowledgeBase).Search(0xc0001b4000, {0x7ffd2a1b3e10, 0x10}, 0x5)
              /home/jaythegeek/code/jeff/apps/jeff/internal/knowledge/search.go:89 +0x85
      main.runBrainSearch(0xc0000ae300, {0xc0001e6040, 0x1, 0x1})
              /home/jaythegeek/code/jeff/apps/jeff/cmd/jeff/brain.go:156 +0x1a5

      What's causing this FTS panic?
    any_of:
      - technology/fts5-search-index.md
      - operations/brain-search-troubleshooting.md
      - architecture/search-pipeline.md
    notes: "Category: long-error-paste. Go stack trace dominates; real question is the last line about FTS panic."

  - id: error-paste-slack-disconnect
    q: |
      jeff serve keeps dropping:

      2026-04-13T09:14:22Z WRN slack socket disconnected reason="websocket: close 1006 (abnormal closure)"
      2026-04-13T09:14:22Z INF slack reconnecting attempt=1
      2026-04-13T09:14:23Z INF slack connected
      2026-04-13T09:14:45Z WRN slack socket disconnected reason="websocket: close 1006 (abnormal closure)"
      2026-04-13T09:14:45Z INF slack reconnecting attempt=2
      2026-04-13T09:14:46Z INF slack connected
      2026-04-13T09:15:01Z WRN slack socket disconnected reason="websocket: close 1006 (abnormal closure)"
      2026-04-13T09:15:01Z INF slack reconnecting attempt=3
      2026-04-13T09:15:02Z ERR slack max reconnects exceeded, backing off 60s

      This has been happening every 20 seconds for the last hour. Is there a known fix for the socket mode flapping?
    any_of:
      - operations/slack-socket-mode.md
      - operations/jeff-serve-troubleshooting.md
      - integrations/slack-configuration.md
      - architecture/channel-adapters.md
    notes: "Category: long-error-paste. Repeated log lines pad the query; actual ask is about socket mode flapping fix."

  - id: error-paste-embed-timeout
    q: |
      Running jeff brain embed and it's stalling:

      $ jeff brain embed --model bge-m3
      2026-04-12T16:00:01Z INF embed starting articles=5373 model=bge-m3
      2026-04-12T16:00:02Z INF embed batch=1/108 embedded=50
      2026-04-12T16:00:04Z INF embed batch=2/108 embedded=100
      ...
      2026-04-12T16:05:22Z INF embed batch=54/108 embedded=2700
      2026-04-12T16:05:52Z WRN embed ollama timeout batch=55 err="context deadline exceeded"
      2026-04-12T16:06:22Z WRN embed ollama timeout batch=55 err="context deadline exceeded"
      2026-04-12T16:06:52Z WRN embed ollama timeout batch=55 err="context deadline exceeded"

      It gets halfway and then Ollama stops responding. GPU memory maybe? How do I check?
    any_of:
      - operations/ollama-configuration.md
      - operations/embedding-pipeline.md
      - technology/bge-m3-embeddings.md
      - infrastructure/gpu-memory-management.md
    notes: "Category: long-error-paste. Embed progress log dominates; question is about GPU memory check for Ollama timeouts."

  - id: error-paste-git-push-conflict
    q: |
      jeff brain push failed:

      To github.com:jaythegeek/jeff-brain.git
       ! [rejected]        main -> main (non-fast-forward)
      error: failed to push some refs to 'github.com:jaythegeek/jeff-brain.git'
      hint: Updates were rejected because the tip of your current branch is behind
      hint: its remote counterpart. If you want to integrate the remote changes,
      hint: use 'git pull' before pushing again.
      hint: See the 'Note about fast-forwards' in 'git push --help' for details.

      2026-04-13T11:00:01Z ERR brain push failed err="non-fast-forward update rejected"

      Do I need to pull first or is there a force option?
    any_of:
      - operations/brain-git-sync.md
      - operations/brain-conflict-resolution.md
      - architecture/gitstore-backend.md
    notes: "Category: long-error-paste. Git rejection output pads the query; question is about pull-first vs force push."

  - id: error-paste-telegram-webhook
    q: |
      Telegram adapter won't start:

      2026-04-14T08:00:01Z ERR telegram start err="getUpdates conflict: terminated by other getUpdates request; make sure that only one bot instance is running"
      2026-04-14T08:00:01Z INF telegram retrying in=5s
      2026-04-14T08:00:06Z ERR telegram start err="getUpdates conflict: terminated by other getUpdates request; make sure that only one bot instance is running"

      Is there another instance running somewhere? How do I check?
    any_of:
      - operations/telegram-configuration.md
      - operations/jeff-serve-troubleshooting.md
      - integrations/telegram-bot-setup.md
    notes: "Category: long-error-paste. Repeated error lines; actual question is about detecting duplicate bot instances."

  - id: error-paste-drizzle-migration
    q: |
      office migration failed:

      $ bun run db:migrate
      [drizzle-kit] Applying migration 0042_add_agent_sessions...
      LibsqlError: SQLITE_ERROR: table agent_sessions already exists
          at Database.exec (/home/jaythegeek/code/jeff/apps/office/node_modules/better-sqlite3/lib/methods/exec.js:14:14)
          at Object.run (/home/jaythegeek/code/jeff/apps/office/node_modules/drizzle-kit/bin.cjs:48291:21)
          at migrate (/home/jaythegeek/code/jeff/apps/office/node_modules/drizzle-kit/bin.cjs:48412:7)

      Has anyone hit this before? What's the recovery?
    any_of:
      - operations/drizzle-migrations.md
      - operations/office-database.md
      - technology/sqlite-troubleshooting.md
    notes: "Category: long-error-paste. Node stack trace noise; question is about duplicate table migration recovery."

  - id: error-paste-cloud-run-oom
    q: |
      gemma4 container keeps dying:

      $ gcloud logging read 'resource.labels.service_name="gemma4-31b" severity>=ERROR' --limit=5
      2026-04-14T02:00:01Z The container was terminated by the operating system because it ran out of memory. Container memory limit (80Gi) exceeded.
      2026-04-14T01:45:01Z The container was terminated by the operating system because it ran out of memory. Container memory limit (80Gi) exceeded.
      2026-04-14T01:30:01Z The container was terminated by the operating system because it ran out of memory. Container memory limit (80Gi) exceeded.

      vLLM metrics before crash showed KV cache at 94%. Is gpu-memory-utilization too high at 0.95?
    any_of:
      - operations/vllm-configuration.md
      - operations/cloud-run-memory-limits.md
      - technology/gemma4-deployment.md
      - infrastructure/gpu-memory-management.md
    notes: "Category: long-error-paste. OOM logs pad the query; actual question is whether gpu-memory-utilisation 0.95 is too aggressive."

  - id: error-paste-linear-webhook
    q: |
      Linear webhook receiver is returning 401:

      $ curl -X POST https://aaw.llev.dev/webhooks/linear/personal \
        -H "Content-Type: application/json" \
        -H "Linear-Signature: sha256=abc123" \
        -d '{"action":"create","type":"Issue","data":{"id":"test"}}'
      {"error":"HMAC verification failed"}

      $ jeff linear status --workspace personal
      Workspace: personal
      Webhook: installed (https://aaw.llev.dev/webhooks/linear/personal)
      Signing secret: configured
      Last event: 2026-04-13T22:00:00Z (14h ago)

      The signing secret looks configured but HMAC keeps failing. Did the secret rotate?
    any_of:
      - operations/linear-webhook-troubleshooting.md
      - integrations/linear-sync-setup.md
      - operations/linear-credential-management.md
    notes: "Category: long-error-paste. Curl output + status output pad the query; question is about HMAC secret rotation."

