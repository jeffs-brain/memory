  # ====================================================================
  # Category 3: Anaphoric references (8 queries)
  # Queries using pronouns or demonstratives that only make sense with
  # conversational context. A distiller should resolve the referent.
  # ====================================================================

  - id: anaphoric-it-broken
    q: "is it broken again?"
    any_of:
      - operations/brain-compile-troubleshooting.md
      - operations/jeff-serve-troubleshooting.md
      - operations/vllm-configuration.md
    notes: "Category: anaphoric. 'it' is unresolvable without context. Distiller must substitute the referent from conversation history."

  - id: anaphoric-same-one
    q: "use the same one as last time"
    any_of:
      - operations/jeff-configuration.md
      - architecture/provider-selection.md
    notes: "Category: anaphoric. 'the same one' requires conversational context. Distiller should resolve or flag as ambiguous."

  - id: anaphoric-that-file
    q: "what does that file do?"
    any_of:
      - architecture/config-yaml-reference.md
      - operations/aliases-yaml.md
    notes: "Category: anaphoric. 'that file' has no referent without context. Distiller needs to resolve from prior turns."

  - id: anaphoric-the-other-one
    q: "no, the other one"
    any_of:
      - operations/jeff-configuration.md
    notes: "Category: anaphoric. Pure correction referencing a prior result. Distiller must resolve from conversation state."

  - id: anaphoric-try-again
    q: "try it again but with the new model"
    any_of:
      - operations/provider-configuration.md
      - technology/model-selection.md
    notes: "Category: anaphoric. Both 'it' and 'the new model' require prior context. Distiller should expand both referents."

  - id: anaphoric-why-did-it-fail
    q: "why did it fail this time?"
    any_of:
      - operations/brain-compile-troubleshooting.md
      - operations/common-errors.md
    notes: "Category: anaphoric. 'it' and 'this time' both need resolution. Without context, query is nearly useless for retrieval."

  - id: anaphoric-update-that
    q: "can you update that to use the latest version?"
    any_of:
      - operations/dependency-management.md
      - operations/version-upgrades.md
    notes: "Category: anaphoric. 'that' and 'latest version' are both unresolved. Distiller must expand from context."

  - id: anaphoric-like-before
    q: "do it like we did before for the Dutch client"
    any_of:
      - clients/oude-reimer.md
      - projects/oude-reimer-quote-generation.md
      - workflows/oude-reimer-chat-assistant.md
    notes: "Category: anaphoric. 'it' and 'the Dutch client' need resolution. 'Before' implies a historical workflow pattern."

  # ====================================================================
  # Category 4: Multi-intent queries (6 queries)
  # Queries asking about multiple distinct things at once. A distiller
  # should either split into separate queries or pick the primary intent.
  # ====================================================================

  - id: multi-intent-deploy-and-rollback
    q: "how do I deploy to staging and also what's the rollback procedure if something goes wrong?"
    any_of:
      - operations/deployment-guide.md
      - operations/staging-environment.md
      - operations/rollback-procedures.md
      - operations/cloud-run-deployment.md
    notes: "Category: multi-intent. Two distinct questions: deployment steps AND rollback procedure. Distiller should split or prioritise."

  - id: multi-intent-search-and-eval
    q: "explain the search pipeline and then show me how to run the eval suite against it"
    any_of:
      - architecture/search-pipeline.md
      - operations/eval-suite-guide.md
      - architecture/retrieval-stack.md
    notes: "Category: multi-intent. Architecture explanation AND operational howto. Two separate retrieval intents."

  - id: multi-intent-slack-telegram
    q: "what's the difference between the slack and telegram adapters and which config keys do each need?"
    any_of:
      - architecture/channel-adapters.md
      - integrations/slack-configuration.md
      - integrations/telegram-bot-setup.md
    notes: "Category: multi-intent. Comparison question AND config reference. Distiller should split into adapter comparison + config lookup."

  - id: multi-intent-memory-and-wiki
    q: "how does memory extraction work and is it different from wiki compilation?"
    any_of:
      - architecture/memory-system.md
      - architecture/memory-extract-recall.md
      - technology/wiki-compilation.md
      - operations/brain-compile-guide.md
    notes: "Category: multi-intent. Memory extraction explanation AND comparison with wiki compile. Two retrieval domains."

  - id: multi-intent-auth-billing
    q: "set up auth for the new client and also configure their billing tier"
    any_of:
      - operations/client-onboarding.md
      - operations/auth-configuration.md
      - administrative/billing-configuration.md
      - administrative/pricing-model.md
    notes: "Category: multi-intent. Auth setup AND billing configuration. Completely separate operational concerns."

  - id: multi-intent-brain-doctor-lint
    q: "what's the difference between brain doctor and brain lint and when should I run each?"
    any_of:
      - operations/brain-doctor-guide.md
      - operations/brain-lint-guide.md
      - operations/brain-health-checks.md
    notes: "Category: multi-intent. Comparison of two tools AND usage guidance. Distiller could split: 'brain doctor purpose' + 'brain lint purpose' + 'when to use each'."

  # ====================================================================
  # Category 5: Negation queries (5 queries)
  # Queries asking about exclusion, absence, or negation. Standard
  # retrieval often ignores NOT/except. A distiller should reframe.
  # ====================================================================

  - id: negation-not-bosch
    q: "which clients are not Bosch?"
    any_of:
      - clients/oude-reimer.md
      - clients/cargill.md
      - clients/heineken.md
      - administrative/client-list.md
    notes: "Category: negation. BM25 will match Bosch articles. Distiller should reframe as 'list all clients excluding Bosch'."

  - id: negation-everything-except-production
    q: "show me all environments except production"
    any_of:
      - operations/staging-environment.md
      - operations/development-environment.md
      - infrastructure/environment-list.md
    notes: "Category: negation. 'except production' is hard for retrieval. Distiller should expand to 'staging, development, and test environments'."

  - id: negation-non-dutch-entities
    q: "companies that aren't based in the Netherlands"
    any_of:
      - clients/cargill.md
      - clients/bosch-pt.md
      - administrative/international-clients.md
