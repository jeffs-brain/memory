  # ====================================================================
  # Category 8: Code-heavy queries (4 queries)
  # Queries with embedded code snippets where the intent needs to be
  # extracted from surrounding natural language.
  # ====================================================================

  - id: code-heavy-store-interface
    q: |
      I'm looking at this interface:

      type Store interface {
          Read(ctx context.Context, p Path) ([]byte, error)
          Write(ctx context.Context, p Path, data []byte) error
          Delete(ctx context.Context, p Path) error
          List(ctx context.Context, prefix Path) ([]Path, error)
          Batch(ctx context.Context, fn func(tx StoreTx) error, opts BatchOptions) error
          Exists(ctx context.Context, p Path) (bool, error)
      }

      Which backends implement this and what are the trade-offs?
    any_of:
      - architecture/brain-storage.md
      - architecture/store-interface.md
      - architecture/fsstore-backend.md
      - architecture/gitstore-backend.md
      - architecture/memstore-backend.md
    notes: "Category: code-heavy. Go interface pasted inline; question is about backend implementations and trade-offs."

  - id: code-heavy-hybrid-options
    q: |
      This struct in search_hybrid.go:

      opts := knowledge.HybridOptions{
          K:      k,
          Mode:   knowledge.HybridFused,
          Rerank: true,
      }

      What does HybridFused do differently from HybridAuto?
    any_of:
      - architecture/search-pipeline.md
      - architecture/retrieval-stack.md
      - technology/hybrid-search-modes.md
    notes: "Category: code-heavy. Go code snippet with a specific question about enum values. Distiller should extract: 'Difference between HybridFused and HybridAuto modes'."

  - id: code-heavy-yaml-config
    q: |
      My config looks like this:

      providers:
        gemma:
          base_url: "https://gemma4-31b-585310675348.europe-west4.run.app"
          api_key: "..."
          model: "gemma-4-31B-it"
          max_model_len: 32767
          json_mode: false
          reasoning_effort: ""

      brain:
        provider: "gemma"
        concurrency: 48

      Is the concurrency too high for a single GPU instance?
    any_of:
      - operations/jeff-configuration.md
      - operations/vllm-configuration.md
      - technology/gemma4-deployment.md
      - operations/brain-compile-guide.md
    notes: "Category: code-heavy. Full YAML config block dominates the query; actual question is about concurrency limits per GPU."

  - id: code-heavy-error-handler
    q: |
      We have this pattern in the serve daemon:

      if errors.Is(err, brain.ErrConflict) {
          log.Warn().Err(err).Msg("conflict on brain push, pulling first")
          if pullErr := store.Pull(ctx); pullErr != nil {
              return fmt.Errorf("pull after conflict: %w", pullErr)
          }
          return store.Push(ctx)
      }

      Is this the right way to handle gitstore conflicts or should we retry the whole batch?
    any_of:
      - architecture/gitstore-backend.md
      - architecture/brain-storage.md
      - operations/brain-conflict-resolution.md
    notes: "Category: code-heavy. Go error handling snippet; question is about conflict resolution strategy for gitstore."
