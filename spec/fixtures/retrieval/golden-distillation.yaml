    any_of:
      - operations/cpu-only-deployment.md
      - operations/deployment-guide.md
      - infrastructure/deployment-options.md
    notes: "Category: negation. 'don't need GPU' should be reframed to 'CPU-only deployment options'."

  - id: negation-without-oauth
